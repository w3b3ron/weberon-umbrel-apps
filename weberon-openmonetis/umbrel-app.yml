description: |
  OpenMonetis é um projeto pessoal de gestão financeira para organizar suas finanças de forma clara e segura.
  Tenha controle total sobre suas contas, cartões, gastos e receitas em um único lugar.
  
  Principais funcionalidades:
  • Gestão de contas e transações com categorização inteligente.
  • Dashboard interativo com gráficos de evolução e relatórios detalhados.
  • Controle de faturas de cartão de crédito e orçamentos por categoria.
  • Importação de extratos OFX e XLS/XLSX.
  • Insights personalizados com IA (opcional).
  • Gestão colaborativa com diferentes níveis de permissão.

